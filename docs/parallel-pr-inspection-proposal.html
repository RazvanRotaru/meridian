          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Capability&quot;&gt;&lt;strong&gt;Fast navigation&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Status&quot;&gt;&lt;span class=&quot;priority-cell&quot;&gt;&lt;span class=&quot;swatch cache&quot;&gt;&lt;/span&gt;Bounded&lt;/span&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Result&quot;&gt;The browser keeps only the current projection and, in Graph, its active scene. Inactive decoded projections and scenes compete in one global LRU capped at three allocations and 48 MiB; a HEAD/merge-base pair is one atomic allocation.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Capability&quot;&gt;&lt;strong&gt;Atomic Codebase transition&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Status&quot;&gt;&lt;span class=&quot;priority-cell&quot;&gt;&lt;span class=&quot;swatch worker&quot;&gt;&lt;/span&gt;Validated&lt;/span&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Result&quot;&gt;A context-keyed busy shell hides superseded projection/layout state until the exact requested pair is installed. Back owns cancellation of a stalled refresh, while activity sequencing prevents superseded work from clearing newer busy state. Cache hits restore without ELK; misses perform one relayout.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Capability&quot;&gt;&lt;strong&gt;Synthetic execution&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Status&quot;&gt;&lt;span class=&quot;priority-cell&quot;&gt;&lt;span class=&quot;swatch disk&quot;&gt;&lt;/span&gt;Preserved&lt;/span&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Result&quot;&gt;#222 capabilities move to a bounded HEAD-only sidecar and file-oriented worker. The web parent does not decode or retain a complete graph; the merge-base descriptor never inherits HEAD capabilities.&lt;/td&gt;
          &lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/section&gt;

    &lt;section class=&quot;panel diagram-stack&quot; id=&quot;mpr-architecture&quot; role=&quot;tabpanel&quot; aria-labelledby=&quot;mpr-tab-architecture&quot; hidden&gt;

    &lt;section class=&quot;panel section-stack&quot; id=&quot;mpr-reasoning&quot; role=&quot;tabpanel&quot; aria-labelledby=&quot;mpr-tab-reasoning&quot; hidden&gt;
      &lt;h2&gt;Why this architecture&lt;/h2&gt;
      &lt;p class=&quot;decision-callout&quot;&gt;&lt;strong&gt;Cacheful statelessness:&lt;/strong&gt; correctness is carried by immutable request identities and descriptors. Mirrors, readers, workers, indexes, and renderer views are performance accelerators with explicit ownership, byte charges, and eviction.&lt;/p&gt;
      &lt;table class=&quot;report-table reasoning-table&quot;&gt;
        &lt;thead&gt;
          &lt;tr&gt;
            &lt;th&gt;Requirement&lt;/th&gt;
            &lt;th&gt;Failure mode&lt;/th&gt;
            &lt;th&gt;Decision&lt;/th&gt;
            &lt;th&gt;Reasoning&lt;/th&gt;
          &lt;/tr&gt;
        &lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Requirement&quot;&gt;&lt;strong&gt;Parallel safety&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Failure mode&quot;&gt;Sharing one mutable checkout would race &lt;code&gt;HEAD&lt;/code&gt;, index, cleanup, and source serving.&lt;/td&gt;
            &lt;td data-label=&quot;Decision&quot;&gt;Share only immutable Git objects; isolate refs and detached worktrees per job.&lt;/td&gt;
            &lt;td data-label=&quot;Reasoning&quot;&gt;Object reuse removes repeated clone/history transfer without coupling filesystem state across inspections.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Requirement&quot;&gt;&lt;strong&gt;Correct comparison&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Failure mode&quot;&gt;A moving target-branch tip is not the comparison base, and a HEAD-only artifact loses deletions, renames, and base ghosts.&lt;/td&gt;
            &lt;td data-label=&quot;Decision&quot;&gt;&lt;code&gt;mergeBaseSha&lt;/code&gt; addresses the comparison; &lt;code&gt;baseSha&lt;/code&gt; remains provenance. Publish both descriptors and the status-rich manifest.&lt;/td&gt;
            &lt;td data-label=&quot;Reasoning&quot;&gt;The identity remains stable for the actual PR diff while UI provenance still explains which base tip was resolved.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Requirement&quot;&gt;&lt;strong&gt;Restart-safe handoff&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Failure mode&quot;&gt;A terminal response that depends on process memory cannot be restored after restart and invites graph registries back into the web process.&lt;/td&gt;
            &lt;td data-label=&quot;Decision&quot;&gt;Publish a normalized content-addressed prepared document and return &lt;code&gt;handoff.id&lt;/code&gt;, &lt;code&gt;handoff.url&lt;/code&gt;, and &lt;code&gt;handoff.viewUrl&lt;/code&gt; in the terminal record.&lt;/td&gt;
            &lt;td data-label=&quot;Reasoning&quot;&gt;&lt;code&gt;GET /api/pr/prepared&lt;/code&gt; can validate and restore exact descriptors from immutable disk state; malformed or mismatched documents fail closed.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Requirement&quot;&gt;&lt;strong&gt;Fast repeated reviews&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Failure mode&quot;&gt;Pair-only caching repeats extraction for the same populated merge base across many PRs.&lt;/td&gt;
            &lt;td data-label=&quot;Decision&quot;&gt;Cache populated merge-base artifacts independently; fingerprint hints for empty-side whole-subtree variants.&lt;/td&gt;
            &lt;td data-label=&quot;Reasoning&quot;&gt;Common base work is reusable, while hint-dependent empty graphs cannot be incorrectly shared.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Requirement&quot;&gt;&lt;strong&gt;Bounded service memory&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Failure mode&quot;&gt;A graph registry or decoded-artifact cache silently recreates the original statefulness and grows with inspection size.&lt;/td&gt;
            &lt;td data-label=&quot;Decision&quot;&gt;The parent opens projection readers only: four readers, each charged to an 8 MiB page cache.&lt;/td&gt;
            &lt;td data-label=&quot;Reasoning&quot;&gt;A complete artifact is never a parent-process correctness dependency; restart and eviction are routine.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Requirement&quot;&gt;&lt;strong&gt;Responsive navigation&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Failure mode&quot;&gt;Keeping every visited graph is unbounded; evicting immediately makes back/forward navigation expensive.&lt;/td&gt;
            &lt;td data-label=&quot;Decision&quot;&gt;Keep only the current projection and its current Graph scene active. Charge every inactive decoded projection or rendered scene to one global LRU: at most three allocations and 48 MiB; HEAD/base pairs are atomic.&lt;/td&gt;
            &lt;td data-label=&quot;Reasoning&quot;&gt;Semantic-only history can remain deep without retaining graph objects. A cache hit restores the exact scene with no ELK; a miss performs one relayout; oversize entries are dropped instead of displacing the budget.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Requirement&quot;&gt;&lt;strong&gt;Correct view transitions&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Failure mode&quot;&gt;A new projection can arrive while the previous ELK layout still reports ready, placing nodes under UI chrome or fitting the wrong context.&lt;/td&gt;
            &lt;td data-label=&quot;Decision&quot;&gt;Key layout results to the exact Codebase context and show an explicit busy shell while the projection pair installs. Back cancels a stalled refresh through the activity owner; sequence ownership prevents superseded work from clearing newer pending state.&lt;/td&gt;
            &lt;td data-label=&quot;Reasoning&quot;&gt;The renderer never exposes stale nodes or preview metadata between contexts, Back remains responsive during a stalled request, and the selected cache outcome performs at most one required layout.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Requirement&quot;&gt;&lt;strong&gt;Perceived performance&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Failure mode&quot;&gt;A static splash hides useful preparation progress until fetch, parse, index, and layout all finish.&lt;/td&gt;
            &lt;td data-label=&quot;Decision&quot;&gt;Mount the shell first, show the five preparation stages, and hydrate/layout projections incrementally.&lt;/td&gt;
            &lt;td data-label=&quot;Reasoning&quot;&gt;Users receive immediate state and cancellation even when cold extraction remains expensive.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Requirement&quot;&gt;&lt;strong&gt;Latest-main feature parity&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Failure mode&quot;&gt;An older boot or store contract could drop private palette scopes, review state, commit anchoring, viewed-state propagation, file-level ghosts, or source-comment diff filtering.&lt;/td&gt;
            &lt;td data-label=&quot;Decision&quot;&gt;Preserve #234 closed-shell/private scopes, #235 complete review state and exact reviewed commit, #236 &lt;code&gt;commit_id&lt;/code&gt; HEAD anchoring, #238 viewed-state propagation, #239 file-level ghost visibility, and #240 source-comment diff filtering.&lt;/td&gt;
            &lt;td data-label=&quot;Reasoning&quot;&gt;The architectural cutover changes ownership and transport, not product semantics; the closed command palette keeps no graph subscription alive, while reviewed files, ghosts, and source comments retain their precise comparison meaning.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Requirement&quot;&gt;&lt;strong&gt;One coherent product&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Failure mode&quot;&gt;Feature fallbacks keep two protocols, two cache formats, and ambiguous failure behavior alive indefinitely.&lt;/td&gt;
            &lt;td data-label=&quot;Decision&quot;&gt;Remove &lt;code&gt;/api/pr/analyze&lt;/code&gt;, complete-graph routes, old cache readers/migrations, and permissive boot fallbacks.&lt;/td&gt;
            &lt;td data-label=&quot;Reasoning&quot;&gt;A strict cutover is easier to reason about, test, secure, and operate; stale entries miss and regenerate.&lt;/td&gt;
          &lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;

      &lt;h2&gt;Deliberate boundaries&lt;/h2&gt;
      &lt;ul class=&quot;decision-list text-small&quot;&gt;
        &lt;li&gt;&lt;strong&gt;Node-local, not distributed Git state.&lt;/strong&gt; Mirrors and worktrees remain local. Multi-node serving requires an external immutable object/artifact store and metadata service, never a shared writable checkout.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;No full-artifact web optimization.&lt;/strong&gt; Faster serialization or compression does not make full-graph hydration acceptable; projection transport is the only serving path.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;No HEAD-only shortcut.&lt;/strong&gt; Deletion, rename, whole-subtree addition, and base-side ghost behavior are release invariants.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;No unbounded concurrency.&lt;/strong&gt; Increase worker capacity only from measured memory, queue latency, and cancellation evidence.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;No hidden compatibility period.&lt;/strong&gt; Old feature records and routes are not read. An incompatible cache entry is a miss, followed by current-format regeneration.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;No landing-UI overlap in PR 1.&lt;/strong&gt; &lt;code&gt;packages/cli/web-ui/index.html&lt;/code&gt; belongs to the second PR and is deliberately unchanged by the canonical stateless cutover.&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/section&gt;

    &lt;section class=&quot;panel section-stack&quot; id=&quot;mpr-contract&quot; role=&quot;tabpanel&quot; aria-labelledby=&quot;mpr-tab-contract&quot; hidden&gt;
      &lt;h2&gt;Strict v1 preparation contract&lt;/h2&gt;
      &lt;p class=&quot;decision-callout&quot;&gt;&lt;strong&gt;One terminal record:&lt;/strong&gt; the client accepts only versioned &lt;code&gt;progress&lt;/code&gt;, &lt;code&gt;done&lt;/code&gt;, or &lt;code&gt;error&lt;/code&gt; NDJSON records and navigates only after one valid &lt;code&gt;done&lt;/code&gt;. Any malformed, duplicate-terminal, HEAD-only, or nullable-comparison response fails closed.&lt;/p&gt;

      &lt;h3&gt;Request&lt;/h3&gt;
      &lt;pre class=&quot;contract-block&quot; aria-label=&quot;Pull request preparation request&quot;&gt;&lt;code&gt;POST /api/pr/prepare
Content-Type: application/json

{
  &quot;owner&quot;: &quot;acme&quot;,
  &quot;repo&quot;: &quot;payments&quot;,
  &quot;subdir&quot;: &quot;services/api&quot;,
  &quot;prNumber&quot;: 418,
  &quot;baseRef&quot;: &quot;main&quot;,
  &quot;headRef&quot;: &quot;refs/pull/418/head&quot;
}&lt;/code&gt;&lt;/pre&gt;

      &lt;h3&gt;NDJSON records&lt;/h3&gt;
      &lt;pre class=&quot;contract-block&quot; aria-label=&quot;Pull request preparation response records&quot;&gt;&lt;code&gt;{&quot;version&quot;:1,&quot;type&quot;:&quot;progress&quot;,&quot;stage&quot;:&quot;resolve&quot;,&quot;elapsedMs&quot;:8}
{&quot;version&quot;:1,&quot;type&quot;:&quot;progress&quot;,&quot;stage&quot;:&quot;git&quot;,&quot;elapsedMs&quot;:74}
{&quot;version&quot;:1,&quot;type&quot;:&quot;progress&quot;,&quot;stage&quot;:&quot;extract-head&quot;,&quot;elapsedMs&quot;:1320}
{&quot;version&quot;:1,&quot;type&quot;:&quot;progress&quot;,&quot;stage&quot;:&quot;extract-merge-base&quot;,&quot;elapsedMs&quot;:884}
{&quot;version&quot;:1,&quot;type&quot;:&quot;progress&quot;,&quot;stage&quot;:&quot;publish&quot;,&quot;elapsedMs&quot;:51}
{&quot;version&quot;:1,&quot;type&quot;:&quot;done&quot;,&quot;headSha&quot;:&quot;&amp;lt;40-hex&amp;gt;&quot;,&quot;baseSha&quot;:&quot;&amp;lt;40-hex provenance tip&amp;gt;&quot;,&quot;mergeBaseSha&quot;:&quot;&amp;lt;40-hex comparison identity&amp;gt;&quot;,&quot;changedFiles&quot;:[{&quot;path&quot;:&quot;src/new.ts&quot;,&quot;status&quot;:&quot;added&quot;},{&quot;path&quot;:&quot;src/core.ts&quot;,&quot;status&quot;:&quot;modified&quot;},{&quot;path&quot;:&quot;src/old.ts&quot;,&quot;status&quot;:&quot;deleted&quot;},{&quot;path&quot;:&quot;src/named.ts&quot;,&quot;previousPath&quot;:&quot;src/name.ts&quot;,&quot;status&quot;:&quot;renamed&quot;}],&quot;head&quot;:{&quot;graphId&quot;:&quot;&amp;lt;id&amp;gt;&quot;,&quot;manifestUrl&quot;:&quot;/api/graph/manifest?id=&amp;lt;id&amp;gt;&quot;,&quot;projectionUrl&quot;:&quot;/api/graph/projection?id=&amp;lt;id&amp;gt;&quot;,&quot;sourceUrl&quot;:&quot;/api/source?id=&amp;lt;id&amp;gt;&quot;,&quot;metaUrl&quot;:&quot;/api/meta?id=&amp;lt;id&amp;gt;&quot;,&quot;graphSummary&quot;:{&quot;schemaVersion&quot;:&quot;&amp;lt;version&amp;gt;&quot;,&quot;generatedAt&quot;:&quot;&amp;lt;ISO timestamp&amp;gt;&quot;,&quot;nodeCount&quot;:0,&quot;edgeCount&quot;:0}},&quot;mergeBase&quot;:{&quot;graphId&quot;:&quot;&amp;lt;id&amp;gt;&quot;,&quot;manifestUrl&quot;:&quot;/api/graph/manifest?id=&amp;lt;id&amp;gt;&quot;,&quot;projectionUrl&quot;:&quot;/api/graph/projection?id=&amp;lt;id&amp;gt;&quot;,&quot;sourceUrl&quot;:&quot;/api/source?id=&amp;lt;id&amp;gt;&quot;,&quot;metaUrl&quot;:&quot;/api/meta?id=&amp;lt;id&amp;gt;&quot;,&quot;graphSummary&quot;:{&quot;schemaVersion&quot;:&quot;&amp;lt;version&amp;gt;&quot;,&quot;generatedAt&quot;:&quot;&amp;lt;ISO timestamp&amp;gt;&quot;,&quot;nodeCount&quot;:0,&quot;edgeCount&quot;:0}},&quot;handoff&quot;:{&quot;id&quot;:&quot;prh-v1-&amp;lt;sha256&amp;gt;&quot;,&quot;url&quot;:&quot;/api/pr/prepared?id=prh-v1-&amp;lt;sha256&amp;gt;&quot;,&quot;viewUrl&quot;:&quot;/?prepared=prh-v1-&amp;lt;sha256&amp;gt;&quot;},&quot;cache&quot;:&quot;miss&quot;,&quot;timings&quot;:{&quot;resolve&quot;:8,&quot;git&quot;:74,&quot;extract-head&quot;:1320,&quot;extract-merge-base&quot;:884,&quot;publish&quot;:51},&quot;warnings&quot;:[]}
{&quot;version&quot;:1,&quot;type&quot;:&quot;error&quot;,&quot;message&quot;:&quot;safe client-facing message&quot;}&lt;/code&gt;&lt;/pre&gt;

      &lt;ul class=&quot;decision-list text-small&quot;&gt;
        &lt;li&gt;&lt;strong&gt;One object per physical line:&lt;/strong&gt; the example above is valid NDJSON. The only progress vocabulary is &lt;code&gt;resolve&lt;/code&gt;, &lt;code&gt;git&lt;/code&gt;, &lt;code&gt;extract-head&lt;/code&gt;, &lt;code&gt;extract-merge-base&lt;/code&gt;, and &lt;code&gt;publish&lt;/code&gt;; every &lt;code&gt;elapsedMs&lt;/code&gt; is finite and non-negative.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Complete descriptors:&lt;/strong&gt; both HEAD and merge-base contain &lt;code&gt;graphId&lt;/code&gt;, &lt;code&gt;manifestUrl&lt;/code&gt;, &lt;code&gt;projectionUrl&lt;/code&gt;, &lt;code&gt;sourceUrl&lt;/code&gt;, &lt;code&gt;metaUrl&lt;/code&gt;, and &lt;code&gt;graphSummary&lt;/code&gt;.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Canonical file status:&lt;/strong&gt; only added/modified/deleted/renamed. A renamed file requires a safe, distinct &lt;code&gt;previousPath&lt;/code&gt;.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Content-addressed handoff:&lt;/strong&gt; the terminal record contains &lt;code&gt;handoff.id&lt;/code&gt;, &lt;code&gt;handoff.url&lt;/code&gt;, and &lt;code&gt;handoff.viewUrl&lt;/code&gt;. The ID is &lt;code&gt;prh-v1-&amp;lt;sha256&amp;gt;&lt;/code&gt; over the exact normalized prepared JSON plus its trailing newline; retrieval validates both identity and schema before returning it.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Restart-safe restoration:&lt;/strong&gt; &lt;code&gt;GET /api/pr/prepared&lt;/code&gt; restores the same two descriptors and status-rich manifest from disk without graph registration. Missing, malformed, oversized, or hash-mismatched documents fail closed.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Bounded streaming:&lt;/strong&gt; require NDJSON content type, cap line bytes, validate UTF-8 and record counts, and reject data after the terminal record.&lt;/li&gt;
      &lt;/ul&gt;

      &lt;h2&gt;State and memory ownership&lt;/h2&gt;
      &lt;table class=&quot;report-table state-table&quot;&gt;
        &lt;thead&gt;
          &lt;tr&gt;
            &lt;th&gt;State&lt;/th&gt;
            &lt;th&gt;Owner and lifetime&lt;/th&gt;
            &lt;th&gt;Bound / eviction&lt;/th&gt;
            &lt;th&gt;Correctness role&lt;/th&gt;
          &lt;/tr&gt;
        &lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;State&quot;&gt;&lt;strong&gt;Bare partial mirror&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Owner and lifetime&quot;&gt;Node-local repository/security-domain cache; shared across jobs.&lt;/td&gt;
            &lt;td data-label=&quot;Bound / eviction&quot;&gt;Disk quota and operator GC; short lock only for mutation.&lt;/td&gt;
            &lt;td data-label=&quot;Correctness role&quot;&gt;Accelerator. Pinned OIDs and immutable request identity remain authoritative.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;State&quot;&gt;&lt;strong&gt;Detached worktree&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Owner and lifetime&quot;&gt;One lease per extraction job and revision.&lt;/td&gt;
            &lt;td data-label=&quot;Bound / eviction&quot;&gt;Scheduler admission; remove after publish/abort/crash.&lt;/td&gt;
            &lt;td data-label=&quot;Correctness role&quot;&gt;Isolates mutable &lt;code&gt;HEAD&lt;/code&gt;, index, and filesystem state.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;State&quot;&gt;&lt;strong&gt;Complete artifact&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Owner and lifetime&quot;&gt;Built transiently in the extraction child, then persisted as immutable bytes on disk.&lt;/td&gt;
            &lt;td data-label=&quot;Bound / eviction&quot;&gt;Never retained in the web parent or browser; disk generation retention/GC only.&lt;/td&gt;
            &lt;td data-label=&quot;Correctness role&quot;&gt;Source for projection publication and file-oriented synthetic work.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;State&quot;&gt;&lt;strong&gt;Prepared handoff&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Owner and lifetime&quot;&gt;Immutable disk document addressed by &lt;code&gt;prh-v1-&amp;lt;sha256&amp;gt;&lt;/code&gt;; distinct from the comparison-artifact cache.&lt;/td&gt;
            &lt;td data-label=&quot;Bound / eviction&quot;&gt;≤2 MiB per document; ≤256 entries and 64 MiB total; seven-day idle TTL with atomic write/replace.&lt;/td&gt;
            &lt;td data-label=&quot;Correctness role&quot;&gt;Restores exact two-sided descriptors and the canonical changed-file manifest after restart.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;State&quot;&gt;&lt;strong&gt;Projection bundle v2&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Owner and lifetime&quot;&gt;Immutable disk bundle with file-to-node index, changed-path shards, and entry-module shards.&lt;/td&gt;
            &lt;td data-label=&quot;Bound / eviction&quot;&gt;Request limits: ≤512 file paths / 48 KiB path input; response ≤5k nodes, ≤20k edges, ≤16 MiB.&lt;/td&gt;
            &lt;td data-label=&quot;Correctness role&quot;&gt;The only graph transport contract.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;State&quot;&gt;&lt;strong&gt;Server reader cache&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Owner and lifetime&quot;&gt;Web process; lazily opened projection readers.&lt;/td&gt;
            &lt;td data-label=&quot;Bound / eviction&quot;&gt;At most four readers, each charged to an 8 MiB page cache; LRU eviction.&lt;/td&gt;
            &lt;td data-label=&quot;Correctness role&quot;&gt;None. Any reader can be reopened from its descriptor.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;State&quot;&gt;&lt;strong&gt;Active renderer view&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Owner and lifetime&quot;&gt;Browser; the current projection and, only while Graph is current, its active rendered scene.&lt;/td&gt;
            &lt;td data-label=&quot;Bound / eviction&quot;&gt;Pinned while current and excluded from the inactive budget; replaced on navigation. A HEAD + merge-base pair installs and leaves as one unit.&lt;/td&gt;
            &lt;td data-label=&quot;Correctness role&quot;&gt;The only graph data allowed to remain live outside the navigation accelerator.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;State&quot;&gt;&lt;strong&gt;Inactive navigation allocations&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Owner and lifetime&quot;&gt;Browser accelerator shared by decoded projection pairs and rendered Graph scenes.&lt;/td&gt;
            &lt;td data-label=&quot;Bound / eviction&quot;&gt;One global LRU: maximum three inactive allocations and 48 MiB charged bytes. Oversize entries are dropped; composite pairs evict atomically.&lt;/td&gt;
            &lt;td data-label=&quot;Correctness role&quot;&gt;None. A hit restores exactly with no ELK; an eviction or miss refetches and performs one layout.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;State&quot;&gt;&lt;strong&gt;Semantic navigation history&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Owner and lifetime&quot;&gt;Browser; lightweight contexts, IDs, and navigation intent.&lt;/td&gt;
            &lt;td data-label=&quot;Bound / eviction&quot;&gt;No decoded nodes, edges, positions, or rendered scenes. Hidden React Flow node/edge arrays and positions are cleared when Codebase owns the view.&lt;/td&gt;
            &lt;td data-label=&quot;Correctness role&quot;&gt;Preserves back/forward meaning independently of whether heavy cache entries survive.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;State&quot;&gt;&lt;strong&gt;Synthetic capability sidecar&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Owner and lifetime&quot;&gt;Immutable descriptor metadata for HEAD only.&lt;/td&gt;
            &lt;td data-label=&quot;Bound / eviction&quot;&gt;Bounded scenarios, fingerprint, trust, and provenance; no graph objects.&lt;/td&gt;
            &lt;td data-label=&quot;Correctness role&quot;&gt;Preserves #222 consent/provenance while file workers perform artifact-dependent work.&lt;/td&gt;
          &lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/section&gt;

    &lt;section class=&quot;panel section-stack&quot; id=&quot;mpr-implementation&quot; role=&quot;tabpanel&quot; aria-labelledby=&quot;mpr-tab-implementation&quot; hidden&gt;
      &lt;h2&gt;Implementation and rollout plan&lt;/h2&gt;
      &lt;p class=&quot;decision-callout&quot;&gt;&lt;strong&gt;Current checkpoint:&lt;/strong&gt; the canonical branch is rebased onto &lt;code&gt;a820c99&lt;/code&gt;, explicitly preserves #234–#240 alongside the earlier synthetic and two-sided behavior, and has passed its full branch-wide validation gate. It is ready to open as the first draft PR. Delivery remains split into ordered pull requests so the landing client cannot target an unstable contract.&lt;/p&gt;

      &lt;ol class=&quot;roadmap&quot; aria-label=&quot;Implementation phases&quot;&gt;
        &lt;li&gt;
          &lt;h3&gt;✓ Isolate execution&lt;/h3&gt;
          &lt;p class=&quot;text-small text-muted&quot;&gt;Mirror, worktrees, workers, admission, cancellation&lt;/p&gt;
        &lt;/li&gt;
        &lt;li&gt;
          &lt;h3&gt;✓ Publish two sides&lt;/h3&gt;
          &lt;p class=&quot;text-small text-muted&quot;&gt;Strict prepare v1, canonical statuses, base reuse&lt;/p&gt;
        &lt;/li&gt;
        &lt;li&gt;
          &lt;h3&gt;✓ Project by path&lt;/h3&gt;

    (() =&gt; {

      if (!root) return;
      const tabs = Array.from(root.querySelectorAll(&#x27;[role=&quot;tab&quot;]&#x27;));
      const panels = Array.from(root.querySelectorAll(&#x27;[role=&quot;tabpanel&quot;]&#x27;));

      const selectPanel = (name) =&gt; {
        tabs.forEach((tab) =&gt; {
          const selected = tab.dataset.panel === name;
          tab.setAttribute(&quot;aria-selected&quot;, String(selected));
          tab.classList.toggle(&quot;btn-primary&quot;, selected);
          tab.tabIndex = selected ? 0 : -1;
        });
        panels.forEach((panel) =&gt; {
          panel.hidden = panel.id !== `mpr-${name}`;
        });
      };

      const focusRelativeTab = (current, offset) =&gt; {
        const index = tabs.indexOf(current);
        const next = tabs[(index + offset + tabs.length) % tabs.length];
        selectPanel(next.dataset.panel);
        next.focus();
      };

      tabs.forEach((tab) =&gt; {
        tab.addEventListener(&quot;click&quot;, () =&gt; selectPanel(tab.dataset.panel));
        tab.addEventListener(&quot;keydown&quot;, (event) =&gt; {
          if (event.key === &quot;ArrowRight&quot;) {
            event.preventDefault();
            focusRelativeTab(tab, 1);
          } else if (event.key === &quot;ArrowLeft&quot;) {
            event.preventDefault();
            focusRelativeTab(tab, -1);
          } else if (event.key === &quot;Home&quot;) {
            event.preventDefault();
            selectPanel(tabs[0].dataset.panel);
            tabs[0].focus();
          } else if (event.key === &quot;End&quot;) {
            event.preventDefault();
            selectPanel(tabs[tabs.length - 1].dataset.panel);
            tabs[tabs.length - 1].focus();
