  &lt;header aria-labelledby=&quot;mpr7-title&quot;&gt;
    &lt;span class=&quot;eyebrow text-small&quot;&gt;Architecture decision · protocol v9 · validated on Autopilot #4358&lt;/span&gt;
    &lt;h1 id=&quot;mpr7-title&quot;&gt;Parallel PR inspection without whole-graph browser state&lt;/h1&gt;
    &lt;div class=&quot;decision-line&quot;&gt;
      &lt;span class=&quot;viz-badge&quot;&gt;Decision: adopt&lt;/span&gt;
      &lt;strong&gt;Stateless request workers, a shared mirror per canonical repository and security domain, immutable two-sided projections, and a bounded client LRU.&lt;/strong&gt;
    &lt;/div&gt;
    &lt;p class=&quot;lead&quot;&gt;The analysis graph remains complete on disk. Browser graph payloads contain only the current review coordinate: a bounded changed-file overview or one exact file, for both HEAD and merge-base. The browser separately retains the canonical file manifest, compact review progress, one immutable comparison-classification document, and coordinate-local coverage facts. Parallel inspections share Git and immutable cache work without sharing mutable review state.&lt;/p&gt;
    &lt;div class=&quot;correction&quot; role=&quot;note&quot; aria-label=&quot;Benchmark correction&quot;&gt;
      &lt;strong&gt;Regression correction&lt;/strong&gt;
      &lt;span class=&quot;note&quot;&gt;The prior zero-node overview was not a performance win; it was unusable. Projection transport v9 replaces it with representative changed-file nodes plus ancestor closure and strict coverage for unmapped, filtered, deferred, and absent files. Graph-backed test truth remains available for the complete changed-file manifest through one immutable comparison sidecar, even when a tagged test is outside the current projection.&lt;/span&gt;
    &lt;/div&gt;
  &lt;/header&gt;

        &lt;span&gt;Selecting &lt;code&gt;Tools.ts&lt;/code&gt; loaded a complete 332-node HEAD slice and 330-node base slice, including &lt;code&gt;DelegateTodoTool&lt;/code&gt;, &lt;code&gt;loadTools&lt;/code&gt;, and &lt;code&gt;wrapToolsWithRemoteModeGuard&lt;/code&gt;. Exact slices are complete within strict transport limits or rejected; they are never silently truncated.&lt;/span&gt;

      &lt;div class=&quot;fact&quot;&gt;
        &lt;strong&gt;No full-artifact fallback&lt;/strong&gt;
        &lt;span&gt;The #4358 protocol-v9 run used bounded projection responses plus one 927 B immutable metadata document. Overview and exact responses embed no comparison-wide classification catalog, and the browser rendered without hydrating either 55k-node artifact.&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;fact&quot;&gt;
        &lt;strong&gt;Canonical comparison survives&lt;/strong&gt;
        &lt;span&gt;The canonical 29-file manifest retained 13 added and 16 modified entries for #4358. The same strict schema preserves deleted and renamed entries with &lt;code&gt;previousPath&lt;/code&gt;; base-side ghosts use the exact merge-base.&lt;/span&gt;

  &lt;figure aria-labelledby=&quot;mpr7-architecture&quot;&gt;
    &lt;figcaption id=&quot;mpr7-architecture&quot;&gt;&lt;strong&gt;Ownership model: share expensive immutable work, isolate mutable inspection state&lt;/strong&gt;&lt;/figcaption&gt;
    &lt;div class=&quot;architecture&quot; role=&quot;img&quot; aria-label=&quot;Independent PR requests share a repository mirror and immutable snapshot cache, then receive isolated bounded current-view projections&quot;&gt;
      &lt;div class=&quot;stack&quot;&gt;

      &lt;/div&gt;

    &lt;div class=&quot;ownership-line&quot; aria-label=&quot;Ownership boundaries&quot;&gt;

  &lt;section aria-labelledby=&quot;mpr7-memory&quot;&gt;
    &lt;h2 id=&quot;mpr7-memory&quot;&gt;Bounded-memory navigation&lt;/h2&gt;
    &lt;div class=&quot;memory-rail&quot; role=&quot;img&quot; aria-label=&quot;The browser moves from a bounded overview to one exact file, caches recent inactive allocations for navigation, and globally evicts the least recently used allocation&quot;&gt;
      &lt;div class=&quot;memory-step&quot;&gt;&lt;strong&gt;1 · Overview&lt;/strong&gt;&lt;span&gt;18 HEAD + 13 base representatives&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;arrow&quot; aria-hidden=&quot;true&quot;&gt;→&lt;/div&gt;
      &lt;div class=&quot;memory-step&quot;&gt;&lt;strong&gt;2 · Exact file&lt;/strong&gt;&lt;span&gt;&lt;code&gt;Tools.ts&lt;/code&gt;: 332 + 330 nodes&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;arrow&quot; aria-hidden=&quot;true&quot;&gt;→&lt;/div&gt;
      &lt;div class=&quot;memory-step&quot;&gt;&lt;strong&gt;3 · Back / forward&lt;/strong&gt;&lt;span&gt;Promote a recent immutable pair or scene from LRU&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;arrow&quot; aria-hidden=&quot;true&quot;&gt;→&lt;/div&gt;
      &lt;div class=&quot;memory-step&quot;&gt;&lt;strong&gt;4 · Eviction&lt;/strong&gt;&lt;span&gt;Release least-recent inactive allocation globally&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;two-column&quot;&gt;
      &lt;div&gt;
        &lt;div class=&quot;manifest-line&quot;&gt;&lt;strong&gt;Overview pair&lt;/strong&gt;&lt;span class=&quot;text-muted&quot;&gt;82.6 KiB resident&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;budget-bar&quot; aria-label=&quot;Overview memory is a small fraction of an exact file pair&quot;&gt;&lt;span style=&quot;--fill:3.4%&quot;&gt;&lt;/span&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div&gt;
        &lt;div class=&quot;manifest-line&quot;&gt;&lt;strong&gt;Exact &lt;code&gt;Tools.ts&lt;/code&gt; pair&lt;/strong&gt;&lt;span class=&quot;text-muted&quot;&gt;2.294 MiB resident&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;budget-bar&quot; aria-label=&quot;Exact file pair memory&quot;&gt;&lt;span style=&quot;--fill:100%&quot;&gt;&lt;/span&gt;&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;p class=&quot;note&quot;&gt;The complete 55k-node graphs remain addressable on disk. In steady state, decoded graph/layout memory is one active allocation plus a browser-wide inactive LRU capped at three allocations and 48 MiB; staged candidates use separate bounded admission. Inactive review progress keeps manifest order, compact per-file state, the test-filter coordinate, and only node IDs that own user ticks. Exact unit rows are recomputed when a file becomes active, so the progress catalog never grows into a second graph.&lt;/p&gt;

  &lt;section aria-labelledby=&quot;mpr7-reasoning&quot;&gt;
    &lt;h2 id=&quot;mpr7-reasoning&quot;&gt;Why this architecture&lt;/h2&gt;
    &lt;div class=&quot;proposal-grid&quot;&gt;
      &lt;div class=&quot;proposal&quot;&gt;
        &lt;strong&gt;One mirror per repository security domain&lt;/strong&gt;
        &lt;span&gt;Eliminates duplicate clones without crossing credential boundaries. A short mirror lock protects fetch/ref mutation; each job analyzes an isolated detached worktree or immutable snapshot.&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;proposal&quot;&gt;
        &lt;strong&gt;Stateless workers with bounded admission&lt;/strong&gt;
        &lt;span&gt;Any worker can serve any preparation request. Per-request state has an owner and cancellation signal; capacity is explicit rather than hidden in a singleton service.&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;proposal&quot;&gt;
        &lt;strong&gt;Merge-base-addressed immutable cache&lt;/strong&gt;
        &lt;span&gt;The comparison graph keys on the exact merge-base. A moving base SHA is provenance, not cache identity, so unrelated base movement does not invalidate valid work.&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;proposal&quot;&gt;
        &lt;strong&gt;Projection transport, never full hydration&lt;/strong&gt;
        &lt;span&gt;The server owns complete artifacts and emits validated overview or complete-or-fail-closed exact-file slices. Renderer parse, index, layout, and graph memory costs stay bounded.&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;proposal&quot;&gt;
        &lt;strong&gt;Strict versioned contract&lt;/strong&gt;
        &lt;span&gt;&lt;code&gt;POST /api/pr/prepare&lt;/code&gt; streams NDJSON v1 &lt;code&gt;progress | done | error&lt;/code&gt;; done carries complete HEAD and merge-base descriptors plus the canonical file manifest. Projection transport is v9 and review projection content identity is v5.&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;proposal&quot;&gt;
        &lt;strong&gt;Atomic latest-only transitions&lt;/strong&gt;
        &lt;span&gt;Projection pairs stage off-screen, validate, then publish with derived review state in one store update. Superseded requests abort and never expose mixed coordinates.&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;proposal&quot;&gt;
        &lt;strong&gt;Bounded navigation metadata&lt;/strong&gt;
        &lt;span&gt;Review progress stores compact per-file state and only explicit user-tick node IDs; exact rows are recomputed after eviction. Test truth is fetched once per immutable comparison and shared by reference across coordinates. Empty states distinguish hidden tests, budget deferral, mapped-but-cardless content, and genuine no-match results.&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section aria-labelledby=&quot;mpr7-timing&quot;&gt;
    &lt;h2 id=&quot;mpr7-timing&quot;&gt;Measured path&lt;/h2&gt;

      &lt;div class=&quot;phase-row&quot;&gt;&lt;span&gt;Git&lt;/span&gt;&lt;span class=&quot;phase-track&quot;&gt;&lt;span class=&quot;phase-mark&quot; style=&quot;--fill:.7%&quot;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;phase-value&quot;&gt;2.235 s&lt;/span&gt;&lt;/div&gt;

  &lt;section aria-labelledby=&quot;mpr7-plan&quot;&gt;

  &lt;section aria-labelledby=&quot;mpr7-guards&quot;&gt;
    &lt;h2 id=&quot;mpr7-guards&quot;&gt;Correctness and regression gates&lt;/h2&gt;
    &lt;div class=&quot;guard-grid&quot;&gt;
      &lt;div class=&quot;guard&quot;&gt;&lt;strong&gt;Fail closed&lt;/strong&gt;&lt;span&gt;Missing/corrupt overview or metadata sidecars, reciprocal peer/content mismatches, malformed classification catalogs, and incomplete exact slices are errors. Protocol v9 participates in PR and ordinary web-cache identity; review content identity v5 prevents older comparison semantics from hitting.&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;guard&quot;&gt;&lt;strong&gt;Two-sided parity&lt;/strong&gt;&lt;span&gt;Added, modified, deleted, and renamed files retain exact HEAD + merge-base behavior, including previous-path aliases and base ghosts.&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;guard&quot;&gt;&lt;strong&gt;Memory invariant&lt;/strong&gt;&lt;span&gt;Only the active allocation and global three-entry/48 MiB inactive LRU own decoded graphs or scenes. Progress, sparse classifications, and one-page coverage remain graph-free.&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;guard&quot;&gt;&lt;strong&gt;Usability invariant&lt;/strong&gt;&lt;span&gt;An overview with extracted changed nodes must render representatives; strict &lt;code&gt;isTest&lt;/code&gt; facts survive filtering, and empty states use visible member count rather than invisible seed sentinels.&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;guard&quot;&gt;&lt;strong&gt;Atomic ownership&lt;/strong&gt;&lt;span&gt;Entry, refresh, URL restore, resume, close, and end publish atomically. URL restore releases private scene ownership; stale writes or restores cannot mutate newer sessions; transport-native eviction removes inactive review projections.&lt;/span&gt;&lt;/div&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script id=&quot;codex-visualization-lucide&quot; async src=&quot;https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
&lt;/script&gt;
