          &lt;div class=&quot;bench-row&quot;&gt;&lt;span&gt;Full graphs&lt;/span&gt;&lt;span class=&quot;bench-track&quot;&gt;&lt;span class=&quot;bench-bar&quot; style=&quot;--fill:100%;--series:var(--viz-series-3)&quot;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;bench-value&quot;&gt;99.901 MB&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;bench-row&quot;&gt;&lt;span&gt;Projections&lt;/span&gt;&lt;span class=&quot;bench-track&quot;&gt;&lt;span class=&quot;bench-bar&quot; style=&quot;--fill:14.27%;--series:var(--viz-series-1)&quot;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;bench-value&quot;&gt;14.257 MB&lt;/span&gt;&lt;/div&gt;
          &lt;span class=&quot;text-small text-muted&quot;&gt;121 comparison paths · complete, with no omissions · 85.7% fewer bytes&lt;/span&gt;
        &lt;/div&gt;
      &lt;/figure&gt;
    &lt;/div&gt;
    &lt;div class=&quot;facts-grid&quot;&gt;
      &lt;div class=&quot;fact&quot; style=&quot;--series:var(--viz-series-1)&quot;&gt;&lt;strong&gt;Work eliminated&lt;/strong&gt;&lt;p&gt;The legacy landing path analyzed the base blueprint first, then analyzed HEAD and merge-base. Direct preparation publishes only the required two-sided pair.&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;fact&quot; style=&quot;--series:var(--viz-series-2)&quot;&gt;&lt;strong&gt;Extraction overlaps&lt;/strong&gt;&lt;p&gt;HEAD took 28.607 s and merge-base 54.292 s, but they ran concurrently; the 58.602 s wall time is governed by the slower side rather than their sum.&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;fact&quot; style=&quot;--series:var(--viz-series-3)&quot;&gt;&lt;strong&gt;Control payload&lt;/strong&gt;&lt;p&gt;Strict v1 preparation returned 18.176 KB versus 342.833 KB for legacy generate + analyze responses: 94.7% fewer control-plane bytes.&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;fact&quot; style=&quot;--series:var(--viz-series-5)&quot;&gt;&lt;strong&gt;Resident bound&lt;/strong&gt;&lt;p&gt;The complete review pair declared 42.77 MB resident, within the shared 48 MiB recent-view budget; only its active view is pinned.&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;fact&quot; style=&quot;--series:var(--viz-series-2)&quot;&gt;&lt;strong&gt;Parallel proof&lt;/strong&gt;&lt;p&gt;With two memory-safe worker slots, cold PRs #245 and #237 completed in 66.98 s versus a 99.97 s wall-time sum: 32.99 s of real overlap. Auto admission correctly reduced to one slot when host headroom was insufficient.&lt;/p&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;p class=&quot;methodology text-small&quot;&gt;Same repository and PR, exact &lt;code&gt;origin/main@9fad1e1&lt;/code&gt; baseline, isolated servers and cache roots. Cold runs used empty caches; warm runs reused immutable outputs. Times are end-to-end server wall time, not modeled estimates.&lt;/p&gt;
  &lt;/section&gt;

  &lt;section aria-labelledby=&quot;mpr-flow-heading&quot;&gt;
    &lt;h2 id=&quot;mpr-flow-heading&quot;&gt;One inspection, end to end&lt;/h2&gt;
    &lt;div class=&quot;flow-grid&quot;&gt;
      &lt;div class=&quot;flow&quot;&gt;&lt;span class=&quot;step&quot;&gt;1&lt;/span&gt;&lt;div&gt;&lt;strong&gt;Resolve exact revisions&lt;/strong&gt;&lt;p&gt;HEAD, base-tip provenance, and merge-base comparison identity are separated.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;flow&quot;&gt;&lt;span class=&quot;step&quot;&gt;2&lt;/span&gt;&lt;div&gt;&lt;strong&gt;Reuse Git objects&lt;/strong&gt;&lt;p&gt;A short mirror mutation lock fetches objects; work proceeds in a detached job worktree.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;flow&quot;&gt;&lt;span class=&quot;step&quot;&gt;3&lt;/span&gt;&lt;div&gt;&lt;strong&gt;Extract behind admission&lt;/strong&gt;&lt;p&gt;Memory-aware scheduling, keyed singleflight, subscriber cancellation, and process-tree teardown bound CPU-heavy work.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;flow&quot;&gt;&lt;span class=&quot;step&quot;&gt;4&lt;/span&gt;&lt;div&gt;&lt;strong&gt;Publish both sides&lt;/strong&gt;&lt;p&gt;HEAD and merge-base descriptors, canonical file statuses, facts, source capabilities, and a restart-safe handoff are committed atomically.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;flow&quot;&gt;&lt;span class=&quot;step&quot;&gt;5&lt;/span&gt;&lt;div&gt;&lt;strong&gt;Hydrate the selected view&lt;/strong&gt;&lt;p&gt;The renderer sends exact focus, expansion, causal, Service, test, and reachability selectors—never the whole artifact.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;flow&quot;&gt;&lt;span class=&quot;step&quot;&gt;6&lt;/span&gt;&lt;div&gt;&lt;strong&gt;Navigate through eviction&lt;/strong&gt;&lt;p&gt;Semantic history remains deep; decoded projections and scenes are disposable accelerators.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section aria-labelledby=&quot;mpr-contract-heading&quot;&gt;
    &lt;h2 id=&quot;mpr-contract-heading&quot;&gt;Strict transport contracts&lt;/h2&gt;
    &lt;div class=&quot;contract&quot;&gt;
      &lt;div&gt;
        &lt;h3&gt;Direct PR preparation · v1 NDJSON&lt;/h3&gt;
        &lt;pre&gt;&lt;code&gt;{ &quot;version&quot;: 1, &quot;type&quot;: &quot;progress&quot;,
  &quot;stage&quot;: &quot;extract-head&quot;, &quot;elapsedMs&quot;: 842 }

{ &quot;version&quot;: 1, &quot;type&quot;: &quot;done&quot;,
  &quot;headSha&quot;: &quot;…&quot;, &quot;baseSha&quot;: &quot;…&quot;,
  &quot;mergeBaseSha&quot;: &quot;…&quot;,
  &quot;changedFiles&quot;: [
    { &quot;path&quot;: &quot;src/new.ts&quot;, &quot;status&quot;: &quot;added&quot; },
    { &quot;path&quot;: &quot;src/old.ts&quot;, &quot;status&quot;: &quot;deleted&quot; },
    { &quot;path&quot;: &quot;src/new-name.ts&quot;,
      &quot;previousPath&quot;: &quot;src/old-name.ts&quot;,
      &quot;status&quot;: &quot;renamed&quot; }
  ],
  &quot;head&quot;: { &quot;graphId&quot;: &quot;…&quot;, &quot;metaUrl&quot;: &quot;…&quot; },
  &quot;mergeBase&quot;: { &quot;graphId&quot;: &quot;…&quot;, &quot;metaUrl&quot;: &quot;…&quot; } }&lt;/code&gt;&lt;/pre&gt;
      &lt;/div&gt;
      &lt;div&gt;
        &lt;h3&gt;Projection query · strict v5&lt;/h3&gt;
        &lt;ul&gt;
          &lt;li&gt;Views: modules, service, UI, logic, review.&lt;/li&gt;
          &lt;li&gt;Exact selectors: file paths, real focus/expanded/extra IDs, causal IDs, Service lead IDs, tests, and reachability.&lt;/li&gt;
          &lt;li&gt;Caps: 5,000 nodes, 20,000 edges, 16 MiB response, bounded request fields.&lt;/li&gt;
          &lt;li&gt;Facts: module overview, Service topology, reachability, hierarchy, and completeness.&lt;/li&gt;
          &lt;li&gt;Comparison is path-addressed; HEAD IDs never leak into merge-base requests.&lt;/li&gt;
          &lt;li&gt;Missing, corrupt, symlinked, empty, hash-mismatched, or oversized facts fail closed.&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;p class=&quot;note&quot;&gt;&lt;strong&gt;No compatibility route:&lt;/strong&gt; &lt;code&gt;/api/pr/analyze&lt;/code&gt;, unversioned responses, graph-ID-only handoffs, nullable comparison descriptors, v3/v4 projection readers, generic radius expansion, and full-artifact browser hydration are intentionally absent.&lt;/p&gt;
  &lt;/section&gt;

  &lt;section aria-labelledby=&quot;mpr-memory-heading&quot;&gt;
    &lt;h2 id=&quot;mpr-memory-heading&quot;&gt;Memory and eviction model&lt;/h2&gt;
    &lt;div class=&quot;memory&quot; role=&quot;img&quot; aria-label=&quot;Browser and server memory ownership limits&quot;&gt;
      &lt;div class=&quot;memory-row&quot;&gt;&lt;strong&gt;Current projection&lt;/strong&gt;&lt;div class=&quot;memory-track&quot;&gt;&lt;span style=&quot;--fill:100%;--series:var(--viz-series-1)&quot;&gt;&lt;/span&gt;&lt;/div&gt;&lt;span class=&quot;memory-value&quot;&gt;pinned&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;memory-row&quot;&gt;&lt;strong&gt;Inactive views&lt;/strong&gt;&lt;div class=&quot;memory-track&quot;&gt;&lt;span style=&quot;--fill:48%;--series:var(--viz-series-5)&quot;&gt;&lt;/span&gt;&lt;/div&gt;&lt;span class=&quot;memory-value&quot;&gt;3 / 48 MiB&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;memory-row&quot;&gt;&lt;strong&gt;Server readers&lt;/strong&gt;&lt;div class=&quot;memory-track&quot;&gt;&lt;span style=&quot;--fill:32%;--series:var(--viz-series-3)&quot;&gt;&lt;/span&gt;&lt;/div&gt;&lt;span class=&quot;memory-value&quot;&gt;4 bounded LRU&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;memory-row&quot;&gt;&lt;strong&gt;Whole artifacts&lt;/strong&gt;&lt;div class=&quot;memory-track&quot;&gt;&lt;span style=&quot;--fill:0%;--series:var(--destructive)&quot;&gt;&lt;/span&gt;&lt;/div&gt;&lt;span class=&quot;memory-value&quot;&gt;0 retained&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;facts-grid&quot;&gt;
      &lt;div class=&quot;fact&quot; style=&quot;--series:var(--viz-series-1)&quot;&gt;&lt;strong&gt;Active ownership&lt;/strong&gt;&lt;p&gt;Only the current decoded projection and the scene currently on screen are pinned.&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;fact&quot; style=&quot;--series:var(--viz-series-5)&quot;&gt;&lt;strong&gt;Back / forward&lt;/strong&gt;&lt;p&gt;Projection pairs and rendered scenes compete in one byte-charged LRU; a pair evicts atomically and oversize entries are not cached.&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;fact&quot; style=&quot;--series:var(--viz-series-3)&quot;&gt;&lt;strong&gt;Revision-global truth&lt;/strong&gt;&lt;p&gt;Compact module, Service, and reachability facts stay on disk and are co-paged only when requested. The browser never re-derives global claims from a partial slice.&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;fact&quot; style=&quot;--series:var(--viz-series-2)&quot;&gt;&lt;strong&gt;Concurrent consumers&lt;/strong&gt;&lt;p&gt;Layouts requesting the same coordinate share one hydration and atomic install; a different navigation coordinate cancels and supersedes it.&lt;/p&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section aria-labelledby=&quot;mpr-reasoning-heading&quot;&gt;
    &lt;h2 id=&quot;mpr-reasoning-heading&quot;&gt;Why these choices&lt;/h2&gt;
    &lt;dl class=&quot;decision-grid&quot;&gt;
      &lt;div&gt;&lt;dt&gt;One mirror, many worktrees&lt;/dt&gt;&lt;dd&gt;Object transfer is shared without sharing mutable checkout state. Clone cost drops while jobs remain isolated.&lt;/dd&gt;&lt;/div&gt;
      &lt;div&gt;&lt;dt&gt;Merge-base as identity&lt;/dt&gt;&lt;dd&gt;The comparison cache follows what the diff actually compares. The moving base tip remains provenance only.&lt;/dd&gt;&lt;/div&gt;
      &lt;div&gt;&lt;dt&gt;Two-sided publication&lt;/dt&gt;&lt;dd&gt;Deleted and renamed declarations, base ghosts, changed status, and comparison flows remain correct after every projection swap.&lt;/dd&gt;&lt;/div&gt;
      &lt;div&gt;&lt;dt&gt;Facts beside slices&lt;/dt&gt;&lt;dd&gt;Small revision-global summaries preserve truthful overview, Service, and coverage UX without retaining an entire graph.&lt;/dd&gt;&lt;/div&gt;
      &lt;div&gt;&lt;dt&gt;Store-level singleflight&lt;/dt&gt;&lt;dd&gt;Network deduplication alone is insufficient when two layouts can abort each other. Hydration and installation share one coordinate owner.&lt;/dd&gt;&lt;/div&gt;
      &lt;div&gt;&lt;dt&gt;Strict cutover&lt;/dt&gt;&lt;dd&gt;One contract is easier to secure, cache, test, and operate. Old caches miss and regenerate instead of entering a dual-read path.&lt;/dd&gt;&lt;/div&gt;
    &lt;/dl&gt;
  &lt;/section&gt;

  &lt;section aria-labelledby=&quot;mpr-plan-heading&quot;&gt;
    &lt;h2 id=&quot;mpr-plan-heading&quot;&gt;Implementation and merge plan&lt;/h2&gt;
    &lt;div class=&quot;timeline&quot; aria-label=&quot;Implementation and pull request order&quot;&gt;
      &lt;div class=&quot;timeline-item&quot;&gt;&lt;strong&gt;Implemented&lt;/strong&gt;&lt;span class=&quot;timeline-mark&quot;&gt;&lt;/span&gt;&lt;div&gt;&lt;strong&gt;Shared mirror + isolated jobs&lt;/strong&gt;&lt;p&gt;Admission, worker pool, singleflight, subscriber cancellation, teardown, disk snapshots, and prepared handoffs.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;timeline-item&quot;&gt;&lt;strong&gt;Implemented&lt;/strong&gt;&lt;span class=&quot;timeline-mark&quot;&gt;&lt;/span&gt;&lt;div&gt;&lt;strong&gt;Strict v5 projections&lt;/strong&gt;&lt;p&gt;Bounded selectors, status-rich review pairs, compact facts, fail-closed validation, search, and source/meta capabilities.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;timeline-item&quot;&gt;&lt;strong&gt;Implemented&lt;/strong&gt;&lt;span class=&quot;timeline-mark&quot;&gt;&lt;/span&gt;&lt;div&gt;&lt;strong&gt;Bounded renderer&lt;/strong&gt;&lt;p&gt;Shell-first boot, current-view hydration, shared recent-view budget, semantic history, two-sided atomic install, and same-coordinate hydration sharing.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;timeline-item&quot;&gt;&lt;strong&gt;PR 1&lt;/strong&gt;&lt;span class=&quot;timeline-mark&quot;&gt;&lt;/span&gt;&lt;div&gt;&lt;strong&gt;Merge #245&lt;/strong&gt;&lt;p&gt;The canonical stateless/projection architecture lands first after CI is green.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;timeline-item&quot;&gt;&lt;strong&gt;PR 2&lt;/strong&gt;&lt;span class=&quot;timeline-mark&quot;&gt;&lt;/span&gt;&lt;div&gt;&lt;strong&gt;Rebase landing performance work&lt;/strong&gt;&lt;p&gt;Keep progressive PR pagination, call only strict v1 &lt;code&gt;/api/pr/prepare&lt;/code&gt;, and provide no fallback.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;timeline-item&quot;&gt;&lt;strong&gt;Canary&lt;/strong&gt;&lt;span class=&quot;timeline-mark&quot;&gt;&lt;/span&gt;&lt;div&gt;&lt;strong&gt;Tune from timings&lt;/strong&gt;&lt;p&gt;Begin at admission 1, verify correctness and memory, then enable default 2 where measured headroom permits.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section aria-labelledby=&quot;mpr-observe-heading&quot;&gt;
    &lt;h2 id=&quot;mpr-observe-heading&quot;&gt;Release evidence and observability&lt;/h2&gt;
    &lt;div class=&quot;facts-grid&quot;&gt;
      &lt;div&gt;&lt;span class=&quot;gate&quot;&gt;Build and six package typechecks&lt;/span&gt;&lt;p class=&quot;text-small text-muted&quot;&gt;Production build is clean apart from the existing Vite chunk-size warning.&lt;/p&gt;&lt;/div&gt;
      &lt;div&gt;&lt;span class=&quot;gate&quot;&gt;352 unit-test files&lt;/span&gt;&lt;p class=&quot;text-small text-muted&quot;&gt;3,157 passed, 1 skipped across core, metrics, both extractors, renderer, and CLI.&lt;/p&gt;&lt;/div&gt;
      &lt;div&gt;&lt;span class=&quot;gate&quot;&gt;25 browser journeys&lt;/span&gt;&lt;p class=&quot;text-small text-muted&quot;&gt;All 7 E2E files pass, including projection navigation, two-sided review, deletion parity, persistence, and flow interactions.&lt;/p&gt;&lt;/div&gt;
      &lt;div&gt;&lt;span class=&quot;gate&quot;&gt;Lifecycle stress&lt;/span&gt;&lt;p class=&quot;text-small text-muted&quot;&gt;Worker cancellation, process-tree cleanup, source-child boot, projection corruption, eviction, and two-sided review invariants.&lt;/p&gt;&lt;/div&gt;
      &lt;div&gt;&lt;span class=&quot;gate&quot;&gt;Phase timings&lt;/span&gt;&lt;p class=&quot;text-small text-muted&quot;&gt;Git, HEAD extraction, merge-base extraction, publication, projection transfer, parse/index, layout, and first usable paint.&lt;/p&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;p class=&quot;note&quot;&gt;Operational alerts should cover queue saturation, worker crashes, repeated extraction, projection cap rejection, corrupt sidecars, cancellation leaks, cache churn, and first-usable-paint regressions.&lt;/p&gt;
  &lt;/section&gt;
&lt;/div&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };
