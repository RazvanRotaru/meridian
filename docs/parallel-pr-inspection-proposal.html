      &lt;h2&gt;Recommended cutover&lt;/h2&gt;
      &lt;p class=&quot;decision-callout&quot;&gt;&lt;strong&gt;Decision:&lt;/strong&gt; make each inspection an immutable, cancelable job and keep only bounded caches around it. A request prepares two exact revisions, persists projection-ready artifacts, and returns descriptors. The web parent and browser never own the complete graph.&lt;/p&gt;

            &lt;td data-label=&quot;Status&quot;&gt;&lt;span class=&quot;priority-cell&quot;&gt;&lt;span class=&quot;swatch identity&quot;&gt;&lt;/span&gt;Cutover&lt;/span&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Result&quot;&gt;One strict v1 NDJSON operation resolves Git once and prepares exact HEAD plus exact merge-base descriptors, including &lt;code&gt;metaUrl&lt;/code&gt;.&lt;/td&gt;

          &lt;tr&gt;
            &lt;td data-label=&quot;Capability&quot;&gt;&lt;strong&gt;Repository reuse&lt;/strong&gt;&lt;/td&gt;

            &lt;td data-label=&quot;Capability&quot;&gt;&lt;strong&gt;Fast navigation&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Status&quot;&gt;&lt;span class=&quot;priority-cell&quot;&gt;&lt;span class=&quot;swatch cache&quot;&gt;&lt;/span&gt;Bounded&lt;/span&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Result&quot;&gt;The browser keeps one active single/composite projection plus at most three recent inactive views under a shared 48 MiB charged LRU.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Capability&quot;&gt;&lt;strong&gt;Synthetic execution&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Status&quot;&gt;&lt;span class=&quot;priority-cell&quot;&gt;&lt;span class=&quot;swatch risk&quot;&gt;&lt;/span&gt;Reconciling&lt;/span&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Result&quot;&gt;#222 capabilities move to a bounded HEAD-only sidecar and file-oriented worker. The web parent does not decode or retain a complete graph; the merge-base descriptor never inherits HEAD capabilities.&lt;/td&gt;
          &lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/section&gt;

    &lt;section class=&quot;panel section-stack&quot; id=&quot;mpr-reasoning&quot; role=&quot;tabpanel&quot; aria-labelledby=&quot;mpr-tab-reasoning&quot; hidden&gt;
      &lt;h2&gt;Why this architecture&lt;/h2&gt;
      &lt;p class=&quot;decision-callout&quot;&gt;&lt;strong&gt;Cacheful statelessness:&lt;/strong&gt; correctness is carried by immutable request identities and descriptors. Mirrors, readers, workers, indexes, and renderer views are performance accelerators with explicit ownership, byte charges, and eviction.&lt;/p&gt;
      &lt;table class=&quot;report-table reasoning-table&quot;&gt;
        &lt;thead&gt;
          &lt;tr&gt;
            &lt;th&gt;Requirement&lt;/th&gt;
            &lt;th&gt;Failure mode&lt;/th&gt;
            &lt;th&gt;Decision&lt;/th&gt;
            &lt;th&gt;Reasoning&lt;/th&gt;
          &lt;/tr&gt;
        &lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Requirement&quot;&gt;&lt;strong&gt;Parallel safety&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Failure mode&quot;&gt;Sharing one mutable checkout would race &lt;code&gt;HEAD&lt;/code&gt;, index, cleanup, and source serving.&lt;/td&gt;
            &lt;td data-label=&quot;Decision&quot;&gt;Share only immutable Git objects; isolate refs and detached worktrees per job.&lt;/td&gt;
            &lt;td data-label=&quot;Reasoning&quot;&gt;Object reuse removes repeated clone/history transfer without coupling filesystem state across inspections.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Requirement&quot;&gt;&lt;strong&gt;Correct comparison&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Failure mode&quot;&gt;A moving target-branch tip is not the comparison base, and a HEAD-only artifact loses deletions, renames, and base ghosts.&lt;/td&gt;
            &lt;td data-label=&quot;Decision&quot;&gt;&lt;code&gt;mergeBaseSha&lt;/code&gt; addresses the comparison; &lt;code&gt;baseSha&lt;/code&gt; remains provenance. Publish both descriptors and the status-rich manifest.&lt;/td&gt;
            &lt;td data-label=&quot;Reasoning&quot;&gt;The identity remains stable for the actual PR diff while UI provenance still explains which base tip was resolved.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Requirement&quot;&gt;&lt;strong&gt;Fast repeated reviews&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Failure mode&quot;&gt;Pair-only caching repeats extraction for the same populated merge base across many PRs.&lt;/td&gt;
            &lt;td data-label=&quot;Decision&quot;&gt;Cache populated merge-base artifacts independently; fingerprint hints for empty-side whole-subtree variants.&lt;/td&gt;
            &lt;td data-label=&quot;Reasoning&quot;&gt;Common base work is reusable, while hint-dependent empty graphs cannot be incorrectly shared.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Requirement&quot;&gt;&lt;strong&gt;Bounded service memory&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Failure mode&quot;&gt;A graph registry or decoded-artifact cache silently recreates the original statefulness and grows with inspection size.&lt;/td&gt;
            &lt;td data-label=&quot;Decision&quot;&gt;The parent opens projection readers only: four readers, each charged to an 8 MiB page cache.&lt;/td&gt;
            &lt;td data-label=&quot;Reasoning&quot;&gt;A complete artifact is never a parent-process correctness dependency; restart and eviction are routine.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Requirement&quot;&gt;&lt;strong&gt;Responsive navigation&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Failure mode&quot;&gt;Keeping every visited graph is unbounded; evicting immediately makes back/forward navigation expensive.&lt;/td&gt;
            &lt;td data-label=&quot;Decision&quot;&gt;Keep the active single/composite review plus three recent inactive projections under one 48 MiB charged LRU.&lt;/td&gt;
            &lt;td data-label=&quot;Reasoning&quot;&gt;The common navigation loop is warm while memory remains capped and composite HEAD/base ownership is atomic.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Requirement&quot;&gt;&lt;strong&gt;Perceived performance&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Failure mode&quot;&gt;A static splash hides useful preparation progress until fetch, parse, index, and layout all finish.&lt;/td&gt;
            &lt;td data-label=&quot;Decision&quot;&gt;Mount the shell first, show the five preparation stages, and hydrate/layout projections incrementally.&lt;/td&gt;
            &lt;td data-label=&quot;Reasoning&quot;&gt;Users receive immediate state and cancellation even when cold extraction remains expensive.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Requirement&quot;&gt;&lt;strong&gt;#222 capability parity&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Failure mode&quot;&gt;Persisting scenario graphs or decoding a full artifact in the web parent would violate the memory cutover.&lt;/td&gt;
            &lt;td data-label=&quot;Decision&quot;&gt;Persist only bounded scenario/fingerprint/trust/provenance metadata on HEAD and execute artifact-dependent work in a file-oriented child.&lt;/td&gt;
            &lt;td data-label=&quot;Reasoning&quot;&gt;Synthetic execution preserves consent and exact provenance without giving the serving process a graph heap.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Requirement&quot;&gt;&lt;strong&gt;One coherent product&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Failure mode&quot;&gt;Feature fallbacks keep two protocols, two cache formats, and ambiguous failure behavior alive indefinitely.&lt;/td&gt;
            &lt;td data-label=&quot;Decision&quot;&gt;Remove &lt;code&gt;/api/pr/analyze&lt;/code&gt;, complete-graph routes, old cache readers/migrations, and permissive boot fallbacks.&lt;/td&gt;
            &lt;td data-label=&quot;Reasoning&quot;&gt;A strict cutover is easier to reason about, test, secure, and operate; stale entries miss and regenerate.&lt;/td&gt;
          &lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;

      &lt;h2&gt;Deliberate boundaries&lt;/h2&gt;
      &lt;ul class=&quot;decision-list text-small&quot;&gt;
        &lt;li&gt;&lt;strong&gt;Node-local, not distributed Git state.&lt;/strong&gt; Mirrors and worktrees remain local. Multi-node serving requires an external immutable object/artifact store and metadata service, never a shared writable checkout.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;No full-artifact web optimization.&lt;/strong&gt; Faster serialization or compression does not make full-graph hydration acceptable; projection transport is the only serving path.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;No HEAD-only shortcut.&lt;/strong&gt; Deletion, rename, whole-subtree addition, and base-side ghost behavior are release invariants.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;No unbounded concurrency.&lt;/strong&gt; Increase worker capacity only from measured memory, queue latency, and cancellation evidence.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;No hidden compatibility period.&lt;/strong&gt; Old feature records and routes are not read. An incompatible cache entry is a miss, followed by current-format regeneration.&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/section&gt;

    &lt;section class=&quot;panel section-stack&quot; id=&quot;mpr-contract&quot; role=&quot;tabpanel&quot; aria-labelledby=&quot;mpr-tab-contract&quot; hidden&gt;
      &lt;h2&gt;Strict v1 preparation contract&lt;/h2&gt;
      &lt;p class=&quot;decision-callout&quot;&gt;&lt;strong&gt;One terminal record:&lt;/strong&gt; the client accepts only versioned &lt;code&gt;progress&lt;/code&gt;, &lt;code&gt;done&lt;/code&gt;, or &lt;code&gt;error&lt;/code&gt; NDJSON records and navigates only after one valid &lt;code&gt;done&lt;/code&gt;. Any malformed, duplicate-terminal, HEAD-only, or nullable-comparison response fails closed.&lt;/p&gt;

      &lt;h3&gt;Request&lt;/h3&gt;
      &lt;pre class=&quot;contract-block&quot; aria-label=&quot;Pull request preparation request&quot;&gt;&lt;code&gt;POST /api/pr/prepare
Content-Type: application/json

{
  &quot;owner&quot;: &quot;acme&quot;,
  &quot;repo&quot;: &quot;payments&quot;,
  &quot;subdir&quot;: &quot;services/api&quot;,
  &quot;prNumber&quot;: 418,
  &quot;baseRef&quot;: &quot;main&quot;,
  &quot;headRef&quot;: &quot;refs/pull/418/head&quot;
}&lt;/code&gt;&lt;/pre&gt;

      &lt;h3&gt;NDJSON records&lt;/h3&gt;
      &lt;pre class=&quot;contract-block&quot; aria-label=&quot;Pull request preparation response records&quot;&gt;&lt;code&gt;{&quot;version&quot;:1,&quot;type&quot;:&quot;progress&quot;,&quot;stage&quot;:&quot;resolve&quot;,&quot;elapsedMs&quot;:8}
{&quot;version&quot;:1,&quot;type&quot;:&quot;progress&quot;,&quot;stage&quot;:&quot;git&quot;,&quot;elapsedMs&quot;:74}
{&quot;version&quot;:1,&quot;type&quot;:&quot;progress&quot;,&quot;stage&quot;:&quot;extract-head&quot;,&quot;elapsedMs&quot;:1320}
{&quot;version&quot;:1,&quot;type&quot;:&quot;progress&quot;,&quot;stage&quot;:&quot;extract-merge-base&quot;,&quot;elapsedMs&quot;:884}
{&quot;version&quot;:1,&quot;type&quot;:&quot;progress&quot;,&quot;stage&quot;:&quot;publish&quot;,&quot;elapsedMs&quot;:51}
{&quot;version&quot;:1,&quot;type&quot;:&quot;done&quot;,&quot;headSha&quot;:&quot;&amp;lt;40-hex&amp;gt;&quot;,&quot;baseSha&quot;:&quot;&amp;lt;40-hex provenance tip&amp;gt;&quot;,&quot;mergeBaseSha&quot;:&quot;&amp;lt;40-hex comparison identity&amp;gt;&quot;,&quot;changedFiles&quot;:[{&quot;path&quot;:&quot;src/new.ts&quot;,&quot;status&quot;:&quot;added&quot;},{&quot;path&quot;:&quot;src/core.ts&quot;,&quot;status&quot;:&quot;modified&quot;},{&quot;path&quot;:&quot;src/old.ts&quot;,&quot;status&quot;:&quot;deleted&quot;},{&quot;path&quot;:&quot;src/named.ts&quot;,&quot;previousPath&quot;:&quot;src/name.ts&quot;,&quot;status&quot;:&quot;renamed&quot;}],&quot;head&quot;:{&quot;graphId&quot;:&quot;&amp;lt;id&amp;gt;&quot;,&quot;manifestUrl&quot;:&quot;/api/graph/manifest?id=&amp;lt;id&amp;gt;&quot;,&quot;projectionUrl&quot;:&quot;/api/graph/projection?id=&amp;lt;id&amp;gt;&quot;,&quot;sourceUrl&quot;:&quot;/api/source?id=&amp;lt;id&amp;gt;&quot;,&quot;metaUrl&quot;:&quot;/api/meta?id=&amp;lt;id&amp;gt;&quot;,&quot;graphSummary&quot;:{&quot;schemaVersion&quot;:&quot;&amp;lt;version&amp;gt;&quot;,&quot;generatedAt&quot;:&quot;&amp;lt;ISO timestamp&amp;gt;&quot;,&quot;nodeCount&quot;:0,&quot;edgeCount&quot;:0}},&quot;mergeBase&quot;:{&quot;graphId&quot;:&quot;&amp;lt;id&amp;gt;&quot;,&quot;manifestUrl&quot;:&quot;/api/graph/manifest?id=&amp;lt;id&amp;gt;&quot;,&quot;projectionUrl&quot;:&quot;/api/graph/projection?id=&amp;lt;id&amp;gt;&quot;,&quot;sourceUrl&quot;:&quot;/api/source?id=&amp;lt;id&amp;gt;&quot;,&quot;metaUrl&quot;:&quot;/api/meta?id=&amp;lt;id&amp;gt;&quot;,&quot;graphSummary&quot;:{&quot;schemaVersion&quot;:&quot;&amp;lt;version&amp;gt;&quot;,&quot;generatedAt&quot;:&quot;&amp;lt;ISO timestamp&amp;gt;&quot;,&quot;nodeCount&quot;:0,&quot;edgeCount&quot;:0}},&quot;cache&quot;:&quot;miss&quot;,&quot;timings&quot;:{&quot;resolve&quot;:8,&quot;git&quot;:74,&quot;extract-head&quot;:1320,&quot;extract-merge-base&quot;:884,&quot;publish&quot;:51},&quot;warnings&quot;:[]}
{&quot;version&quot;:1,&quot;type&quot;:&quot;error&quot;,&quot;message&quot;:&quot;safe client-facing message&quot;}&lt;/code&gt;&lt;/pre&gt;

      &lt;ul class=&quot;decision-list text-small&quot;&gt;
        &lt;li&gt;&lt;strong&gt;One object per physical line:&lt;/strong&gt; the example above is valid NDJSON. The only progress vocabulary is &lt;code&gt;resolve&lt;/code&gt;, &lt;code&gt;git&lt;/code&gt;, &lt;code&gt;extract-head&lt;/code&gt;, &lt;code&gt;extract-merge-base&lt;/code&gt;, and &lt;code&gt;publish&lt;/code&gt;; every &lt;code&gt;elapsedMs&lt;/code&gt; is finite and non-negative.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Complete descriptors:&lt;/strong&gt; both HEAD and merge-base contain &lt;code&gt;graphId&lt;/code&gt;, &lt;code&gt;manifestUrl&lt;/code&gt;, &lt;code&gt;projectionUrl&lt;/code&gt;, &lt;code&gt;sourceUrl&lt;/code&gt;, &lt;code&gt;metaUrl&lt;/code&gt;, and &lt;code&gt;graphSummary&lt;/code&gt;.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Canonical file status:&lt;/strong&gt; only added/modified/deleted/renamed. A renamed file requires a safe, distinct &lt;code&gt;previousPath&lt;/code&gt;.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Bounded streaming:&lt;/strong&gt; require NDJSON content type, cap line bytes, validate UTF-8 and record counts, and reject data after the terminal record.&lt;/li&gt;
      &lt;/ul&gt;

      &lt;h2&gt;State and memory ownership&lt;/h2&gt;
      &lt;table class=&quot;report-table state-table&quot;&gt;
        &lt;thead&gt;
          &lt;tr&gt;
            &lt;th&gt;State&lt;/th&gt;
            &lt;th&gt;Owner and lifetime&lt;/th&gt;
            &lt;th&gt;Bound / eviction&lt;/th&gt;
            &lt;th&gt;Correctness role&lt;/th&gt;
          &lt;/tr&gt;
        &lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;State&quot;&gt;&lt;strong&gt;Bare partial mirror&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Owner and lifetime&quot;&gt;Node-local repository/security-domain cache; shared across jobs.&lt;/td&gt;
            &lt;td data-label=&quot;Bound / eviction&quot;&gt;Disk quota and operator GC; short lock only for mutation.&lt;/td&gt;
            &lt;td data-label=&quot;Correctness role&quot;&gt;Accelerator. Pinned OIDs and immutable request identity remain authoritative.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;State&quot;&gt;&lt;strong&gt;Detached worktree&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Owner and lifetime&quot;&gt;One lease per extraction job and revision.&lt;/td&gt;
            &lt;td data-label=&quot;Bound / eviction&quot;&gt;Scheduler admission; remove after publish/abort/crash.&lt;/td&gt;
            &lt;td data-label=&quot;Correctness role&quot;&gt;Isolates mutable &lt;code&gt;HEAD&lt;/code&gt;, index, and filesystem state.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;State&quot;&gt;&lt;strong&gt;Complete artifact&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Owner and lifetime&quot;&gt;Built transiently in the extraction child, then persisted as immutable bytes on disk.&lt;/td&gt;
            &lt;td data-label=&quot;Bound / eviction&quot;&gt;Never retained in the web parent or browser; disk generation retention/GC only.&lt;/td&gt;
            &lt;td data-label=&quot;Correctness role&quot;&gt;Source for projection publication and file-oriented synthetic work.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;State&quot;&gt;&lt;strong&gt;Projection bundle v2&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Owner and lifetime&quot;&gt;Immutable disk bundle with file-to-node index, changed-path shards, and entry-module shards.&lt;/td&gt;
            &lt;td data-label=&quot;Bound / eviction&quot;&gt;Request limits: ≤512 file paths / 48 KiB path input; response ≤5k nodes, ≤20k edges, ≤16 MiB.&lt;/td&gt;
            &lt;td data-label=&quot;Correctness role&quot;&gt;The only graph transport contract.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;State&quot;&gt;&lt;strong&gt;Server reader cache&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Owner and lifetime&quot;&gt;Web process; lazily opened projection readers.&lt;/td&gt;
            &lt;td data-label=&quot;Bound / eviction&quot;&gt;At most four readers, each charged to an 8 MiB page cache; LRU eviction.&lt;/td&gt;
            &lt;td data-label=&quot;Correctness role&quot;&gt;None. Any reader can be reopened from its descriptor.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;State&quot;&gt;&lt;strong&gt;Active renderer view&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Owner and lifetime&quot;&gt;Browser; one single projection or atomic HEAD + merge-base composite.&lt;/td&gt;
            &lt;td data-label=&quot;Bound / eviction&quot;&gt;Replaced as one charged allocation when navigation changes.&lt;/td&gt;
            &lt;td data-label=&quot;Correctness role&quot;&gt;Only the currently rendered review state.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;State&quot;&gt;&lt;strong&gt;Recent renderer views&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Owner and lifetime&quot;&gt;Browser navigation accelerator.&lt;/td&gt;
            &lt;td data-label=&quot;Bound / eviction&quot;&gt;Maximum three inactive views and 48 MiB total charged bytes; LRU.&lt;/td&gt;
            &lt;td data-label=&quot;Correctness role&quot;&gt;None. Evicted views refetch projections.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;State&quot;&gt;&lt;strong&gt;Synthetic capability sidecar&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Owner and lifetime&quot;&gt;Immutable descriptor metadata for HEAD only.&lt;/td&gt;
            &lt;td data-label=&quot;Bound / eviction&quot;&gt;Bounded scenarios, fingerprint, trust, and provenance; no graph objects.&lt;/td&gt;
            &lt;td data-label=&quot;Correctness role&quot;&gt;Preserves #222 consent/provenance while file workers perform artifact-dependent work.&lt;/td&gt;
          &lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/section&gt;

    &lt;section class=&quot;panel section-stack&quot; id=&quot;mpr-implementation&quot; role=&quot;tabpanel&quot; aria-labelledby=&quot;mpr-tab-implementation&quot; hidden&gt;

      &lt;h2&gt;Performance instrumentation&lt;/h2&gt;
      &lt;ul class=&quot;decision-list text-small&quot;&gt;
        &lt;li&gt;&lt;strong&gt;Server:&lt;/strong&gt; record Git resolve/fetch/worktree, HEAD extraction, merge-base extraction, publication, projection query, and projection serialization.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Transport/client:&lt;/strong&gt; record projection transfer, UTF-8/NDJSON validation, parse, index, layout, shell mount, and first usable paint.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Capacity:&lt;/strong&gt; record queue time, admitted workers, singleflight joins, cancellations, worker RSS, server reader bytes, and renderer active/recent charged bytes.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Compare:&lt;/strong&gt; cold distinct PRs, repeated merge base, identical request, back/forward navigation, and restart serve. Report p50/p95 and peak RSS, not only a single warm timing.&lt;/li&gt;
      &lt;/ul&gt;

      &lt;h2&gt;Risks and mitigations&lt;/h2&gt;
      &lt;table class=&quot;report-table gate-table&quot;&gt;
        &lt;thead&gt;
          &lt;tr&gt;
            &lt;th&gt;Risk&lt;/th&gt;
            &lt;th&gt;Mitigation&lt;/th&gt;
            &lt;th&gt;Release evidence&lt;/th&gt;
          &lt;/tr&gt;
        &lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Risk&quot;&gt;&lt;strong&gt;Empty-side extraction shared incorrectly&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Mitigation&quot;&gt;Reuse populated revisions by SHA/config, but include a stable hint-set fingerprint when whole-subtree behavior creates an empty-side artifact.&lt;/td&gt;
            &lt;td data-label=&quot;Release evidence&quot;&gt;Addition and deletion fixtures across mixed TypeScript/Python projects produce exact two-sided parity.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Risk&quot;&gt;&lt;strong&gt;Projection metadata silently truncated&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Mitigation&quot;&gt;Validate canonical ranges, diff lines, manifests, file paths, versions, and request caps; fail closed rather than filtering malformed records.&lt;/td&gt;
            &lt;td data-label=&quot;Release evidence&quot;&gt;Adversarial format/query tests reject every malformed shard and never broaden an empty file-path query.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Risk&quot;&gt;&lt;strong&gt;Cancellation poisons shared work&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Mitigation&quot;&gt;Give each subscriber a local abort while the shared job continues until its last subscriber leaves; retain teardown tombstones until descendants exit.&lt;/td&gt;
            &lt;td data-label=&quot;Release evidence&quot;&gt;One waiter aborts without affecting another; last waiter abort reclaims worker, refs, worktree, and scheduler slot.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Risk&quot;&gt;&lt;strong&gt;Memory bounds count objects inaccurately&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Mitigation&quot;&gt;Charge encoded/parsed projection bytes and treat a HEAD/base review as one composite allocation. Evict before activation when the budget would be exceeded.&lt;/td&gt;
            &lt;td data-label=&quot;Release evidence&quot;&gt;Large-navigation E2E holds one active plus no more than three recent views and never exceeds the 48 MiB charge.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Risk&quot;&gt;&lt;strong&gt;Latest-main feature regression&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Mitigation&quot;&gt;Resolve conflicts semantically in Git diff/extract, boot, cache, graph, and store areas; add focused #222/#223 tests before the full suite.&lt;/td&gt;
            &lt;td data-label=&quot;Release evidence&quot;&gt;Synthetic provenance and all canonical change statuses pass on the reconciled &lt;code&gt;01c9044&lt;/code&gt; descendant.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Risk&quot;&gt;&lt;strong&gt;Cross-node assumptions leak in&lt;/strong&gt;&lt;/td&gt;
            &lt;td data-label=&quot;Mitigation&quot;&gt;Keep mirrors/worktrees node-local. Externalize immutable artifacts and descriptors before any multi-node claim.&lt;/td&gt;
            &lt;td data-label=&quot;Release evidence&quot;&gt;Deployment documentation states the node/cache-root boundary and prohibits shared writable Git directories.&lt;/td&gt;
          &lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;

      &lt;h2&gt;Validation gates&lt;/h2&gt;
      &lt;table class=&quot;report-table gate-table&quot;&gt;
        &lt;thead&gt;
          &lt;tr&gt;
            &lt;th&gt;Scenario&lt;/th&gt;
            &lt;th&gt;What it proves&lt;/th&gt;
            &lt;th&gt;Pass condition&lt;/th&gt;
          &lt;/tr&gt;
        &lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Scenario&quot;&gt;Strict NDJSON contract&lt;/td&gt;
            &lt;td data-label=&quot;What it proves&quot;&gt;No ambiguous or partial navigation&lt;/td&gt;
            &lt;td data-label=&quot;Pass condition&quot;&gt;Only v1 records and the five stages pass; both descriptors and one terminal record are mandatory; line/content/UTF-8 limits fail closed.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Scenario&quot;&gt;Added, modified, deleted, renamed&lt;/td&gt;
            &lt;td data-label=&quot;What it proves&quot;&gt;#223 comparison parity&lt;/td&gt;
            &lt;td data-label=&quot;Pass condition&quot;&gt;Canonical status manifest, distinct rename &lt;code&gt;previousPath&lt;/code&gt;, two-sided artifacts, base ghosts, and whole-subtree cases match the serial baseline.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Scenario&quot;&gt;Two cold PRs, same repository&lt;/td&gt;
            &lt;td data-label=&quot;What it proves&quot;&gt;Object reuse plus isolated parallelism&lt;/td&gt;
            &lt;td data-label=&quot;Pass condition&quot;&gt;One mirror, separate worktrees, both workers may run, no second full-history clone, and HTTP remains responsive.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Scenario&quot;&gt;Different PRs, same populated merge base&lt;/td&gt;
            &lt;td data-label=&quot;What it proves&quot;&gt;Cross-PR base reuse&lt;/td&gt;
            &lt;td data-label=&quot;Pass condition&quot;&gt;Merge-base extraction executes once for the revision/config identity while each HEAD remains independently keyed.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Scenario&quot;&gt;Identical requests + partial abort&lt;/td&gt;
            &lt;td data-label=&quot;What it proves&quot;&gt;Singleflight and caller-local cancellation&lt;/td&gt;
            &lt;td data-label=&quot;Pass condition&quot;&gt;One execution; aborting one subscriber does not cancel the other; last-subscriber abort reclaims all resources.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Scenario&quot;&gt;Projection query and navigation&lt;/td&gt;
            &lt;td data-label=&quot;What it proves&quot;&gt;No full-graph fallback and bounded warm navigation&lt;/td&gt;
            &lt;td data-label=&quot;Pass condition&quot;&gt;Only selected path/radius shards are read; response caps hold; active/composite plus recent LRU stays within count and byte bounds.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Scenario&quot;&gt;Restart / second same-node process&lt;/td&gt;
            &lt;td data-label=&quot;What it proves&quot;&gt;Descriptors, not memory, carry correctness&lt;/td&gt;
            &lt;td data-label=&quot;Pass condition&quot;&gt;Projection and source resolve by immutable descriptor without graph registration or regeneration.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td data-label=&quot;Scenario&quot;&gt;Synthetic execution&lt;/td&gt;
            &lt;td data-label=&quot;What it proves&quot;&gt;#222 capability without graph residency&lt;/td&gt;
            &lt;td data-label=&quot;Pass condition&quot;&gt;HEAD sidecar preserves consent/fingerprint/trust/provenance, merge base has none, and file worker completes without parent full-artifact decode.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr data-finalize=&quot;full-suite-validation&quot;&gt;
            &lt;td data-label=&quot;Scenario&quot;&gt;Reconciled full suite and E2E&lt;/td&gt;
            &lt;td data-label=&quot;What it proves&quot;&gt;The cutover is releasable as one system&lt;/td&gt;
            &lt;td data-label=&quot;Pass condition&quot;&gt;CLI/renderer typechecks, unit/integration suites, build, browser flows, diff checks, memory benchmarks, and first-usable-paint timings are all green on the final commit.&lt;/td&gt;
          &lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;

      &lt;h2&gt;Rollout&lt;/h2&gt;
      &lt;ul class=&quot;decision-list text-small&quot;&gt;
        &lt;li&gt;&lt;strong&gt;Coordinated format cutover:&lt;/strong&gt; drain old writers, deploy the current-only reader/writer, and use an isolated or freshly generated cache root. There is no feature compatibility reader.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Canary:&lt;/strong&gt; begin with worker concurrency 1, verify artifacts/comparisons, cancellation, projection bounds, and timing telemetry, then enable the default 2 only where memory admission permits.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Observe:&lt;/strong&gt; alert on queue saturation, worker crashes, repeated base extraction, projection cap rejections, renderer eviction churn, and first-usable-paint regression.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Rollback:&lt;/strong&gt; roll back the binary and cache root together. Never let mixed versions write the same cache root.&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/section&gt;
  &lt;/div&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&quot;meridian-parallel-report&quot;);
      if (!root) return;
      const tabs = Array.from(root.querySelectorAll(&#x27;[role=&quot;tab&quot;]&#x27;));
      const panels = Array.from(root.querySelectorAll(&#x27;[role=&quot;tabpanel&quot;]&#x27;));

      const selectPanel = (name) =&gt; {
        tabs.forEach((tab) =&gt; {
          const selected = tab.dataset.panel === name;
          tab.setAttribute(&quot;aria-selected&quot;, String(selected));
          tab.classList.toggle(&quot;btn-primary&quot;, selected);
          tab.tabIndex = selected ? 0 : -1;
        });
        panels.forEach((panel) =&gt; {
          panel.hidden = panel.id !== `mpr-${name}`;
        });
      };

      const focusRelativeTab = (current, offset) =&gt; {
        const index = tabs.indexOf(current);
        const next = tabs[(index + offset + tabs.length) % tabs.length];
        selectPanel(next.dataset.panel);
        next.focus();
      };

      tabs.forEach((tab) =&gt; {
        tab.addEventListener(&quot;click&quot;, () =&gt; selectPanel(tab.dataset.panel));
        tab.addEventListener(&quot;keydown&quot;, (event) =&gt; {
          if (event.key === &quot;ArrowRight&quot;) {
            event.preventDefault();
            focusRelativeTab(tab, 1);
          } else if (event.key === &quot;ArrowLeft&quot;) {
            event.preventDefault();
            focusRelativeTab(tab, -1);
          } else if (event.key === &quot;Home&quot;) {
            event.preventDefault();
            selectPanel(tabs[0].dataset.panel);
            tabs[0].focus();
          } else if (event.key === &quot;End&quot;) {
            event.preventDefault();
            selectPanel(tabs[tabs.length - 1].dataset.panel);
            tabs[tabs.length - 1].focus();
          }
        });
      });
      selectPanel(&quot;status&quot;);
    })();
  &lt;/script&gt;
&lt;/div&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script id=&quot;codex-visualization-lucide&quot; async src=&quot;https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
&lt;/script&gt;
