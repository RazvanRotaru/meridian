<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meridian</title>
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
      }
      /* PR review is a focused, explicit-close surface. While it is preparing or open, suppress
         horizontal viewport overscroll so a trackpad swipe cannot become browser Back. The class
         is owned by prReviewNavigationGuard; x-only containment leaves vertical review scrolling
         and ordinary Back/Forward controls untouched. */
      html.mrd-pr-review-navigation-lock,
      html.mrd-pr-review-navigation-lock body {
        overscroll-behavior-x: none;
      }
      body {
        background: #0e1116;
        color: #e6edf3;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      /* Slim, theme-matching scrollbars — mirrors the landing card's `.card-scroll` so scroll
         surfaces (the PR page's list + detail panel) don't fall back to default OS chrome. */
      .mrd-scroll {
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.12) transparent;
      }
      .mrd-scroll::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      .mrd-scroll::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.12);
        border-radius: 4px;
      }
      .mrd-scroll::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      .mrd-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
